name: Build iLeague Hub

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download ffmpeg (Windows static build)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract
          $exe = Get-ChildItem -Path "ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "ffmpeg.exe"
          Get-Item ffmpeg.exe | Select-Object Length, FullName
          .\ffmpeg.exe -version | Select-Object -First 1

      - name: Build Windows exe
        run: |
          pyinstaller --name iLeagueHub --onefile --noconsole --add-data "static;static" --add-binary "ffmpeg.exe;." --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL.ImageDraw --hidden-import PIL.Image --hidden-import PIL.ImageFont --hidden-import flask_cors hub_agent.py

      - name: Create ZIP
        run: |
          cd dist
          Compress-Archive -Path iLeagueHub.exe -DestinationPath iLeagueHub-win.zip

      - uses: actions/upload-artifact@v4
        with:
          name: iLeagueHub-win
          path: dist/iLeagueHub-win.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Download ffmpeg (macOS static build)
        run: |
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -o ffmpeg.zip
          chmod +x ffmpeg
          ls -lh ffmpeg
          ./ffmpeg -version | head -1

      - name: Build Mac app
        run: |
          pyinstaller --name iLeagueHub --onefile --noconsole --add-data "static:static" --add-binary "ffmpeg:." --hidden-import pystray --hidden-import pystray._darwin --hidden-import PIL --hidden-import PIL.ImageDraw --hidden-import PIL.Image --hidden-import PIL.ImageFont --hidden-import flask_cors hub_agent.py

      - name: Create ZIP
        run: |
          cd dist && zip -r iLeagueHub-mac.zip iLeagueHub.app

      - uses: actions/upload-artifact@v4
        with:
          name: iLeagueHub-mac
          path: dist/iLeagueHub-mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            iLeagueHub-win/iLeagueHub-win.zip
            iLeagueHub-mac/iLeagueHub-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
